name: Release

# Builds self-contained packages for Windows x64 and Linux x86_64 and publishes
# them together as GitHub Release assets.
#
# Triggers:
#   * pushing a tag like `v0.10.1`   -> creates/updates the matching Release
#   * a push to the feature branch   -> builds both packages (uploaded as CI
#                                       artifacts); publishes a Release only when
#                                       the commit message contains "[release]"
#   * manual "Run workflow"          -> builds both; publishes only when the
#                                       release_tag input is set
on:
    push:
        tags:
            - 'v*'
        branches:
            - 'claude/height-measure-multi-tabs-3nqnyb'
    workflow_dispatch:
        inputs:
            release_tag:
                description: 'Tag to create and publish (e.g. v0.10.1). Leave empty to only build the packages without publishing a Release.'
                required: false
                default: ''

permissions:
    contents: write

jobs:
    build-windows:
        runs-on: windows-latest
        name: build-win64-occt7.9.0

        env:
            occ_version: 7.9.0
            assimp_version: 6.0.5

        steps:
        - name: Set globals
          id: globals
          shell: cmd
          run: |
              echo "occ_zip_sha256=e3ec8adea37dd519d6580e3dd1288625c2b0dccbd811c9348c4b138ff9938d32" >> "${GITHUB_OUTPUT}"
              echo "assimp_zip_sha256=7f4fbcbbc9d04d88a790e12bde60c4ffe1f46dd6c40cec8ce8b36f80c11e175a" >> "${GITHUB_OUTPUT}"

        - name: Checkout
          uses: actions/checkout@v4

        - name: Install Qt
          uses: jurplel/install-qt-action@v4
          with:
              version: '6.8.3'
              cache: true
              cache-key-prefix: QtCache

        - name: Cache OpenCascade archive
          id: cache-occ
          uses: actions/cache@v4
          with:
              path: OpenCASCADE-${{env.occ_version}}-vc14-64.zip
              key: occ-${{env.occ_version}}

        - name: Download OpenCascade
          if: steps.cache-occ.outputs.cache-hit != 'true'
          uses: carlosperate/download-file-action@v2
          with:
              file-url: 'https://www.fougue.pro/share/bin/OpenCASCADE-${{env.occ_version}}-vc14-64.zip'
              sha256: ${{steps.globals.outputs.occ_zip_sha256}}

        - name: Extract OpenCascade
          run: 7z x OpenCASCADE-${{env.occ_version}}-vc14-64.zip

        - name: Cache Assimp archive
          id: cache-assimp
          uses: actions/cache@v4
          with:
              path: assimp-${{env.assimp_version}}.zip
              key: assimp-${{env.assimp_version}}

        - name: Download Assimp
          if: steps.cache-assimp.outputs.cache-hit != 'true'
          uses: carlosperate/download-file-action@v2
          with:
              file-url: 'https://www.fougue.pro/share/bin/assimp-${{env.assimp_version}}.zip'
              sha256: ${{steps.globals.outputs.assimp_zip_sha256}}

        - name: Extract Assimp
          run: 7z x assimp-${{env.assimp_version}}.zip

        - name: Get count of CPU cores
          uses: SimenB/github-actions-cpu-cores@v1
          id: cpu-cores

        - name: Configure Compiler
          uses: ilammy/msvc-dev-cmd@v1

        - name: Build (Release)
          shell: cmd
          run: |
              mkdir "${{github.workspace}}\build"
              cd "${{github.workspace}}\build"
              set occ_version=${{env.occ_version}}
              set assimp_version=${{env.assimp_version}}
              cmake .. ^
                    -DMayo_BuildTests=OFF ^
                    -DMayo_BuildPluginAssimp=ON ^
                    -DMayo_BuildConvCli=ON ^
                    -DMayo_PostBuildCopyRuntimeDLLs=ON ^
                    -DArgos_BuildCli=ON ^
                    -DArgos_BuildCoreTests=OFF ^
                    -DOpenCASCADE_DIR=${{github.workspace}}/OpenCASCADE-%occ_version%-vc14-64/opencascade-%occ_version% ^
                    -Dassimp_DIR=${{github.workspace}}/assimp-%assimp_version%/lib/cmake/assimp-%assimp_version:~0,3%
              cmake --build . ^
                    --config Release ^
                    --parallel ${{steps.cpu-cores.outputs.count}}

        - name: Package
          shell: pwsh
          run: |
              $ErrorActionPreference = 'Stop'
              $rel  = "build/Release"
              $dist = "dist/Argos"
              if (-not (Test-Path "$rel/mayo.exe")) { throw "mayo.exe not found in $rel" }
              New-Item -ItemType Directory -Force -Path $dist | Out-Null

              # GUI exe rebranded as Argos.exe; keep the headless tools as-is.
              Copy-Item "$rel/mayo.exe" "$dist/Argos.exe" -Force
              foreach ($exe in @('argos-cli.exe','mayo-conv.exe')) {
                  if (Test-Path "$rel/$exe") { Copy-Item "$rel/$exe" $dist -Force }
              }

              # Runtime DLLs copied next to the build output by
              # Mayo_PostBuildCopyRuntimeDLLs (OCCT TK*, Qt6*, 3rd-party deps).
              Get-ChildItem $rel -Filter *.dll | ForEach-Object { Copy-Item $_.FullName $dist -Force }

              # Authoritative Qt runtime + plugin deployment (platforms/, styles/, ...).
              # windeployqt prints harmless warnings to stderr; don't let them abort.
              $prevEAP = $ErrorActionPreference
              $ErrorActionPreference = 'Continue'
              windeployqt --release --no-translations --no-compiler-runtime "$dist/Argos.exe" *>&1 | Out-Null
              $ErrorActionPreference = $prevEAP

              # Docs + license.
              foreach ($doc in @('README.md','README.en.md','LICENSE.txt')) {
                  if (Test-Path $doc) { Copy-Item $doc $dist -Force }
              }

              if (Test-Path "dist/Argos-win64.zip") { Remove-Item -Force "dist/Argos-win64.zip" }
              Compress-Archive -Path "$dist/*" -DestinationPath "dist/Argos-win64.zip" -Force
              $size = [math]::Round((Get-Item "dist/Argos-win64.zip").Length / 1MB, 1)
              Write-Host "Packaged dist/Argos-win64.zip ($size MB)"

        - name: Upload Windows artifact
          uses: actions/upload-artifact@v4
          with:
              name: Argos-win64
              path: dist/Argos-win64.zip

    build-linux:
        runs-on: ubuntu-latest
        name: build-linux-x86_64

        steps:
        - name: Checkout
          uses: actions/checkout@v4

        - name: Update package lists
          run: sudo apt-get -y update

        - name: Install dependencies (Qt6, OpenCascade, Assimp)
          run: |
              sudo apt-get -y install qt6-base-dev qt6-svg-dev libxcb-cursor0
              sudo apt-get -y install libocct-data-exchange-dev libocct-draw-dev occt-misc
              sudo apt-get -y install libtbb-dev libxi-dev libassimp-dev
              sudo apt-get -y install patchelf

        - name: Build (Release)
          run: |
              mkdir -p "${{github.workspace}}/build"
              cd "${{github.workspace}}/build"
              cmake .. \
                    -DCMAKE_BUILD_TYPE=Release \
                    -DMayo_BuildTests=OFF \
                    -DMayo_BuildPluginAssimp=ON \
                    -DMayo_BuildConvCli=ON \
                    -DArgos_BuildCli=ON \
                    -DArgos_BuildCoreTests=OFF
              cmake --build . --target mayo argos-cli mayo-conv --parallel `nproc`

        - name: Package
          run: |
              build=build
              dist=dist/Argos-linux
              if [ ! -x "$build/mayo" ]; then echo "mayo binary not found in $build"; exit 1; fi
              mkdir -p "$dist/lib" "$dist/plugins/platforms"

              # GUI binary rebranded as Argos; keep the headless tools as-is.
              cp "$build/mayo" "$dist/Argos"
              [ -f "$build/argos-cli" ] && cp "$build/argos-cli" "$dist/"
              [ -f "$build/mayo-conv" ] && cp "$build/mayo-conv" "$dist/"

              # Bundle the non-system shared libraries the binaries pull in (Qt6,
              # OpenCASCADE TK*, assimp, tbb, freetype, ...). Core system libraries
              # (glibc, libstdc++, GL/X/xcb/glib) are intentionally left to the host
              # to avoid ABI clashes. Best-effort: never fail the packaging step.
              bundle_libs() {
                  ldd "$1" 2>/dev/null | awk '{print $3}' | grep -E '^/' | while read -r lib; do
                      case "$lib" in
                          */ld-linux*|*/libc.so*|*/libm.so*|*/libdl.so*|*/libpthread.so*|*/librt.so*|*/libgcc_s*|*/libstdc++*|*/libGL*|*/libGLX*|*/libEGL*|*/libOpenGL*|*/libX11*|*/libxcb*|*/libxkbcommon*|*/libwayland*|*/libglib*|*/libgobject*|*/libgio*) : ;;
                          *) cp -u -L "$lib" "$dist/lib/" 2>/dev/null || true ;;
                      esac
                  done
              }
              bundle_libs "$dist/Argos"
              [ -f "$dist/argos-cli" ] && bundle_libs "$dist/argos-cli"
              [ -f "$dist/mayo-conv" ] && bundle_libs "$dist/mayo-conv"

              # Qt xcb platform plugin + its extra libs.
              qxcb=$(find /usr/lib -name 'libqxcb.so' 2>/dev/null | head -n1 || true)
              if [ -n "$qxcb" ]; then
                  cp -L "$qxcb" "$dist/plugins/platforms/" 2>/dev/null || true
                  bundle_libs "$dist/plugins/platforms/libqxcb.so"
              fi

              # Launcher: point the dynamic loader / Qt at the bundled folders.
              # (YAML strips the block indentation, so these lines land at column 0.)
              cat > "$dist/Argos.sh" <<'EOF'
              #!/usr/bin/env bash
              HERE="$(cd "$(dirname "$0")" && pwd)"
              export LD_LIBRARY_PATH="$HERE/lib:$LD_LIBRARY_PATH"
              export QT_QPA_PLATFORM_PLUGIN_PATH="$HERE/plugins/platforms"
              exec "$HERE/Argos" "$@"
              EOF
              chmod +x "$dist/Argos.sh" "$dist/Argos"
              [ -f "$dist/argos-cli" ] && chmod +x "$dist/argos-cli"
              [ -f "$dist/mayo-conv" ] && chmod +x "$dist/mayo-conv"

              for d in README.md README.en.md LICENSE.txt; do [ -f "$d" ] && cp "$d" "$dist/"; done
              cat > "$dist/RUN-LINUX.txt" <<'EOF'
              Argos for Linux (x86_64)

              Run the GUI with:   ./Argos.sh
              Headless CLI:       ./argos-cli --help

              Common Qt/OCCT/assimp libraries are bundled under lib/. If the app fails
              to start due to a missing system library, install the runtime packages:
                sudo apt-get install qt6-base libqt6svg6 libopencascade-* libassimp5 \
                                     libtbb12 libxi6 libxcb-cursor0
              EOF

              mkdir -p dist
              tar -C dist -czf dist/Argos-linux-x86_64.tar.gz Argos-linux
              echo "Packaged dist/Argos-linux-x86_64.tar.gz ($(du -h dist/Argos-linux-x86_64.tar.gz | cut -f1))"

        - name: Upload Linux artifact
          uses: actions/upload-artifact@v4
          with:
              name: Argos-linux
              path: dist/Argos-linux-x86_64.tar.gz

    publish:
        needs: [build-windows, build-linux]
        runs-on: ubuntu-latest
        # Publish on: a tag push; a manual dispatch with release_tag set; or a
        # branch push whose commit message contains the "[release]" marker (this
        # last path uses the workflow's GITHUB_TOKEN, since tag pushes are blocked
        # in the authoring environment).
        if: startsWith(github.ref, 'refs/tags/') || inputs.release_tag != '' || contains(github.event.head_commit.message, '[release]')
        steps:
        - name: Download build artifacts
          uses: actions/download-artifact@v4
          with:
              path: artifacts

        - name: Publish Release
          uses: softprops/action-gh-release@v2
          with:
              tag_name: ${{ startsWith(github.ref, 'refs/tags/') && github.ref_name || inputs.release_tag || 'v0.10.2' }}
              name: Argos ${{ startsWith(github.ref, 'refs/tags/') && github.ref_name || inputs.release_tag || 'v0.10.2' }}
              target_commitish: ${{ github.sha }}
              files: |
                  artifacts/Argos-win64/Argos-win64.zip
                  artifacts/Argos-linux/Argos-linux-x86_64.tar.gz
              generate_release_notes: true
              fail_on_unmatched_files: true
