name: Release Windows x64

# Builds a self-contained Windows package (Argos.exe + argos-cli + runtime DLLs)
# and publishes it as a GitHub Release asset.
#
# Triggers:
#   * pushing to `main`             -> creates/updates the Release for the version
#                                      declared in CMakeLists.txt (tag created
#                                      server-side, so no local tag push needed)
#   * pushing a tag like `v0.10.1`  -> creates/updates the matching Release
#   * manual "Run workflow"         -> builds the package, uploads it as a CI
#                                      artifact (no Release is published unless
#                                      a release_tag input is given)
on:
    push:
        tags:
            - 'v*'
        branches:
            - 'main'
    workflow_dispatch:
        inputs:
            release_tag:
                description: 'Tag to create and publish (e.g. v0.10.1). Leave empty to only build the package artifact without publishing a Release.'
                required: false
                default: ''

permissions:
    contents: write

jobs:
    build-release:
        runs-on: windows-latest
        name: build-release-win-occt7.9.0

        env:
            occ_version: 7.9.0
            assimp_version: 6.0.5

        steps:
        - name: Set globals
          id: globals
          shell: cmd
          run: |
              echo "occ_zip_sha256=e3ec8adea37dd519d6580e3dd1288625c2b0dccbd811c9348c4b138ff9938d32" >> "${GITHUB_OUTPUT}"
              echo "assimp_zip_sha256=7f4fbcbbc9d04d88a790e12bde60c4ffe1f46dd6c40cec8ce8b36f80c11e175a" >> "${GITHUB_OUTPUT}"

        - name: Checkout
          uses: actions/checkout@v4

        - name: Compute release tag
          id: reltag
          shell: pwsh
          run: |
              $tag = ''
              if ('${{ github.ref }}'.StartsWith('refs/tags/')) {
                  $tag = '${{ github.ref_name }}'
              }
              elseif ('${{ github.event_name }}' -eq 'workflow_dispatch' -and '${{ inputs.release_tag }}' -ne '') {
                  $tag = '${{ inputs.release_tag }}'
              }
              elseif ('${{ github.event_name }}' -eq 'push' -and '${{ github.ref }}' -eq 'refs/heads/main') {
                  # Version declared in CMakeLists.txt drives the release tag.
                  $c = Get-Content CMakeLists.txt -Raw
                  $maj = [regex]::Match($c, 'set\(Mayo_VersionMajor (\d+)\)').Groups[1].Value
                  $min = [regex]::Match($c, 'set\(Mayo_VersionMinor (\d+)\)').Groups[1].Value
                  $pat = [regex]::Match($c, 'set\(Mayo_VersionPatch (\d+)\)').Groups[1].Value
                  $tag = "v$maj.$min.$pat"
              }
              "release_tag=$tag" >> $env:GITHUB_OUTPUT
              Write-Host "release_tag=$tag"

        - name: Install Qt
          uses: jurplel/install-qt-action@v4
          with:
              version: '6.8.3'
              cache: true
              cache-key-prefix: QtCache

        - name: Cache OpenCascade archive
          id: cache-occ
          uses: actions/cache@v4
          with:
              path: OpenCASCADE-${{env.occ_version}}-vc14-64.zip
              key: occ-${{env.occ_version}}

        - name: Download OpenCascade
          if: steps.cache-occ.outputs.cache-hit != 'true'
          uses: carlosperate/download-file-action@v2
          with:
              file-url: 'https://www.fougue.pro/share/bin/OpenCASCADE-${{env.occ_version}}-vc14-64.zip'
              sha256: ${{steps.globals.outputs.occ_zip_sha256}}

        - name: Extract OpenCascade
          run: 7z x OpenCASCADE-${{env.occ_version}}-vc14-64.zip

        - name: Cache Assimp archive
          id: cache-assimp
          uses: actions/cache@v4
          with:
              path: assimp-${{env.assimp_version}}.zip
              key: assimp-${{env.assimp_version}}

        - name: Download Assimp
          if: steps.cache-assimp.outputs.cache-hit != 'true'
          uses: carlosperate/download-file-action@v2
          with:
              file-url: 'https://www.fougue.pro/share/bin/assimp-${{env.assimp_version}}.zip'
              sha256: ${{steps.globals.outputs.assimp_zip_sha256}}

        - name: Extract Assimp
          run: 7z x assimp-${{env.assimp_version}}.zip

        # Korean UI font for the packaged app (best-effort: Argos falls back to
        # the system font if the download fails, so this never blocks a release).
        - name: Fetch Korean UI font (Noto Sans KR, SIL OFL)
          shell: pwsh
          continue-on-error: true
          run: ./scripts/argos-fetch-font.ps1

        - name: Get count of CPU cores
          uses: SimenB/github-actions-cpu-cores@v1
          id: cpu-cores

        - name: Configure Compiler
          uses: ilammy/msvc-dev-cmd@v1

        - name: Build (Release)
          shell: cmd
          run: |
              mkdir "${{github.workspace}}\build"
              cd "${{github.workspace}}\build"
              set occ_version=${{env.occ_version}}
              set assimp_version=${{env.assimp_version}}
              cmake .. ^
                    -DMayo_BuildTests=OFF ^
                    -DMayo_BuildPluginAssimp=ON ^
                    -DMayo_BuildConvCli=ON ^
                    -DMayo_PostBuildCopyRuntimeDLLs=ON ^
                    -DArgos_BuildCli=ON ^
                    -DArgos_BuildCoreTests=OFF ^
                    -DOpenCASCADE_DIR=${{github.workspace}}/OpenCASCADE-%occ_version%-vc14-64/opencascade-%occ_version% ^
                    -Dassimp_DIR=${{github.workspace}}/assimp-%assimp_version%/lib/cmake/assimp-%assimp_version:~0,3%
              cmake --build . ^
                    --config Release ^
                    --parallel ${{steps.cpu-cores.outputs.count}}

        - name: Package
          shell: pwsh
          run: |
              $ErrorActionPreference = 'Stop'
              $rel  = "build/Release"
              $dist = "dist/Argos"
              if (-not (Test-Path "$rel/mayo.exe")) { throw "mayo.exe not found in $rel" }
              New-Item -ItemType Directory -Force -Path $dist | Out-Null

              # GUI exe rebranded as Argos.exe; keep the headless tools as-is.
              Copy-Item "$rel/mayo.exe" "$dist/Argos.exe" -Force
              foreach ($exe in @('argos-cli.exe','mayo-conv.exe')) {
                  if (Test-Path "$rel/$exe") { Copy-Item "$rel/$exe" $dist -Force }
              }

              # Runtime DLLs copied next to the build output by
              # Mayo_PostBuildCopyRuntimeDLLs (OCCT TK*, Qt6*, 3rd-party deps).
              Get-ChildItem $rel -Filter *.dll | ForEach-Object { Copy-Item $_.FullName $dist -Force }

              # Authoritative Qt runtime + plugin deployment (platforms/, styles/, ...).
              # windeployqt prints harmless warnings to stderr; don't let them abort.
              $prevEAP = $ErrorActionPreference
              $ErrorActionPreference = 'Continue'
              windeployqt --release --no-translations --no-compiler-runtime "$dist/Argos.exe" *>&1 | Out-Null
              $ErrorActionPreference = $prevEAP

              # Korean UI font (fetched by argos-fetch-font.ps1; optional).
              if (Test-Path 'resources/fonts') {
                  Copy-Item 'resources/fonts' "$dist/fonts" -Recurse -Force
              }

              # Docs + license + third-party notices. The zip redistributes
              # Qt/OCCT/Assimp/FreeType DLLs (LGPL and BSD/FTL), so their notices
              # and license texts must ship inside the zip, not just in the repo.
              foreach ($doc in @('README.md','README.en.md','LICENSE.txt','docs/THIRD-PARTY-NOTICES.md')) {
                  if (Test-Path $doc) { Copy-Item $doc $dist -Force }
              }
              New-Item -ItemType Directory -Force -Path "$dist/licenses" | Out-Null
              Copy-Item 'doc/3rdparty_licenses.md' "$dist/licenses" -Force
              Copy-Item 'images/credits.txt' "$dist/licenses/icon-credits.txt" -Force
              Copy-Item 'doc/licenses/OFL-NotoSansKR.txt' "$dist/licenses" -Force

              if (Test-Path "dist/Argos-win64.zip") { Remove-Item -Force "dist/Argos-win64.zip" }
              Compress-Archive -Path "$dist/*" -DestinationPath "dist/Argos-win64.zip" -Force
              $size = [math]::Round((Get-Item "dist/Argos-win64.zip").Length / 1MB, 1)
              Write-Host "Packaged dist/Argos-win64.zip ($size MB)"

        - name: Build installer (Inno Setup)
          shell: pwsh
          run: |
              choco install innosetup --no-progress -y
              $ver = '${{ steps.reltag.outputs.release_tag }}' -replace '^v',''
              if (-not $ver) { $ver = '0.0.0' }
              & "${env:ProgramFiles(x86)}\Inno Setup 6\ISCC.exe" `
                  /DAppVersion=$ver `
                  /DDistDir="${{ github.workspace }}\dist\Argos" `
                  /DOutDir="${{ github.workspace }}\dist" `
                  installer\argos.iss

        - name: Upload build artifact
          uses: actions/upload-artifact@v4
          with:
              name: Argos-win64
              path: |
                  dist/Argos-win64.zip
                  dist/Argos-Setup-*.exe

        - name: Publish Release
          if: steps.reltag.outputs.release_tag != ''
          uses: softprops/action-gh-release@v2
          with:
              # Tag resolved by the "Compute release tag" step: pushed tag, manual
              # release_tag input, or CMakeLists.txt version on a push to main.
              # If the tag doesn't exist yet it is created at this commit.
              tag_name: ${{ steps.reltag.outputs.release_tag }}
              name: Argos ${{ steps.reltag.outputs.release_tag }}
              files: |
                  dist/Argos-win64.zip
                  dist/Argos-Setup-*.exe
              generate_release_notes: true
              fail_on_unmatched_files: true
